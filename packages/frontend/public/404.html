<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Arsenal News</title>
  <script>
    var l = window.location;
    var path = l.pathname;
    if (path.indexOf('/?p=') === -1) {
      sessionStorage.setItem('redirect', path + l.search + l.hash);
      l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + '/');
    }
  </script>
</head>
</html>
